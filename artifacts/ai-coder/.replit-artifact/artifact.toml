kind = "web"
previewPath = "/"
title = "iChat AI Coder"
version = "1.0.0"
id = "artifacts/ai-coder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24043
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-coder run dev"

[services.env]
PORT = "24043"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-coder", "run", "build"]
publicDir = "artifacts/ai-coder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
